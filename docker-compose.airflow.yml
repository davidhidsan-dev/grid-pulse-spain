services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    hostname: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.gethostname
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service-account.json
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - "${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/credentials/service-account.json:ro"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    hostname: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.gethostname
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service-account.json
      PYTHONPATH: /opt/airflow/project
    ports:
      - "8080:8080"
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - "${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/credentials/service-account.json:ro"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    hostname: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.gethostname
      GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service-account.json
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - "${GOOGLE_APPLICATION_CREDENTIALS}:/opt/airflow/credentials/service-account.json:ro"
    command: scheduler

volumes:
  postgres-db-volume:
