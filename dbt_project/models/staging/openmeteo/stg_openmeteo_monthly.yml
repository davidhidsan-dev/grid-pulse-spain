version: 2

models:
  - name: stg_openmeteo_monthly
    description: "Staging model for the monthly Open-Meteo raw table across regions."
    columns:
      - name: region_slug
        description: "Region identifier used across extraction and downstream joins."
        tests:
          - not_null
      - name: year_month
        description: "Monthly grain used to align climate with regional energy."
        tests:
          - not_null
      - name: location_name
        description: "Location label saved during extraction."
        tests:
          - not_null
