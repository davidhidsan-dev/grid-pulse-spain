version: 2

models:
  - name: stg_redata_balance_electrico
    description: "Staging model for the REData electric balance raw table across regions."
    columns:
      - name: region_slug
        description: "Region identifier used across extraction and downstream joins."
        tests:
          - not_null
      - name: year_month
        description: "Monthly grain used for the regional balance."
        tests:
          - not_null
      - name: datetime
        description: "Observation timestamp from REData."
        tests:
          - not_null
      - name: metric_type
        description: "Metric category reported by REData."
        tests:
          - not_null
      - name: group_type
        description: "Top-level grouping reported by REData."
        tests:
          - not_null
