version: 2

models:
  - name: mart_energy_weather_monthly
    description: "Monthly analytical join between regional energy balance and regional weather."
    columns:
      - name: region_slug
        description: "Region identifier shared by the energy and weather inputs."
        tests:
          - not_null
      - name: year_month
        description: "Shared monthly grain used to join energy and weather."
        tests:
          - not_null
      - name: metric_type
        description: "Energy metric reported by REData."
        tests:
          - not_null
