name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Python checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          python -m compileall src
          python -m compileall scripts
          python -m compileall dags
          python -m compileall streamlit_app
          python -m compileall tests

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Parse dbt project
        env:
          GCP_PROJECT_ID: dummy-project
          BIGQUERY_DATASET_RAW: grid_pulse_raw
          BIGQUERY_DATASET_ANALYTICS: grid_pulse_analytics
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/grid-pulse-dummy-service-account.json
        run: |
          printf '{}' > /tmp/grid-pulse-dummy-service-account.json
          dbt parse --project-dir dbt_project --profiles-dir dbt_project --no-partial-parse
